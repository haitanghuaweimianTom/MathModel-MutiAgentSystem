# LLM 多提供商配置
# 配置环境变量或在此修改默认值

# OpenAI 配置
openai:
  api_key: ""  # 或设置环境变量 OPENAI_API_KEY
  api_host: "https://api.openai.com"
  model: "gpt-4o"
  temperature: 0.7
  max_tokens: 4096

# Anthropic 配置
anthropic:
  api_key: ""  # 或设置环境变量 ANTHROPIC_API_KEY
  api_host: "https://api.anthropic.com"
  model: "claude-3-5-sonnet-20241022"
  temperature: 0.7
  max_tokens: 4096

# Google Gemini 配置
gemini:
  api_key: ""  # 或设置环境变量 GEMINI_API_KEY
  api_host: "https://generativelanguage.googleapis.com"
  model: "gemini-1.5-flash"
  temperature: 0.7
  max_tokens: 4096

# Ollama 本地模型配置
ollama:
  api_host: "http://localhost:11434"
  model: "llama3.2"
  temperature: 0.7

# Claude Code CLI 配置（向后兼容）
claude_cli:
  model: "sonnet"
  timeout: 600
